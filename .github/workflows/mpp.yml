name: mpp-enforcement

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  pr-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: mypy src
      - run: pytest -q
      - run: pytest -q tests/test_performance_guardrails.py
      - run: python -m scripts.mpp_guard --mode=ci

  full-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -q
      - run: pytest -q tests/test_performance_guardrails.py
      - run: semgrep scan --config auto
      - run: python -m scripts.mpp_self_test
      - run: python -m scripts.mpp_guard --mode=ci

  drift-detection:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -U pip
      - run: pip install -r requirements-dev.txt
      - run: pytest -q tests/test_property_replay.py tests/test_release_seal.py
      - run: python -m scripts.verify_proof_chain --root . --format json
